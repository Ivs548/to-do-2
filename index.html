<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Задачи</title>
<style>
:root{--bg:#F5F5F7;--card:#FFF;--text:#1C1C1E;--subtext:#8E8E93;--border:#E5E5EA;--nav-h:68px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:var(--bg);font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;color:var(--text);overflow:hidden;position:fixed;top:0;left:0}
#app{display:flex;flex-direction:column;height:100%;width:100%;position:relative;overflow:hidden}

/* HEADER */
#header{padding:calc(var(--safe-t)+12px) 56px 8px 20px;background:var(--bg);z-index:10;flex-shrink:0;position:relative}
#header-date{font-size:13px;font-weight:400;color:var(--subtext);line-height:1.3}
#header-list-name{font-size:32px;font-weight:300;letter-spacing:-1px;line-height:1.1;margin-top:1px;transition:color .2s;color:var(--text)}
#note-btn{position:absolute;top:calc(var(--safe-t)+10px);right:16px;width:36px;height:36px;background:#FFFDE7;border-radius:6px 6px 6px 0;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:2px 2px 6px rgba(0,0,0,.1);font-size:18px;z-index:20;transition:transform .15s}
#note-btn.visible{display:flex}
#note-btn:active{transform:scale(.92)}
#note-btn.has-note{background:#FFF9C4}

/* NOTE CARD */
#note-card-wrap{display:none;margin:4px 16px 0}
#note-card-wrap.show{display:block}
#note-card-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 0 4px;background:none;border:none;font-family:inherit}
#note-card-toggle-label{font-size:12px;color:var(--subtext);font-weight:500}
#note-card-arrow{font-size:10px;color:var(--subtext);transition:transform .2s;display:inline-block}
#note-card-arrow.open{transform:rotate(90deg)}
#note-card{display:none;background:#FFFDE7;border-radius:10px;padding:10px 14px;font-size:15px;line-height:1.45;color:#555;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-top:4px}
#note-card.open{display:block}

/* MAIN */
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 0 calc(var(--nav-h)+var(--safe-b)+16px)}
#task-list{padding:0 16px}

/* SWIPE */
.swipe-wrap{position:relative;overflow:hidden}
.delete-bg{position:absolute;left:0;top:0;bottom:0;width:80px;background:#FF9500;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:600;z-index:0;flex-direction:column;gap:2px}
.delete-bg svg{width:18px;height:18px}
.del-right-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:#FF3B30;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:600;z-index:0}

/* TASK */
.task-item{display:flex;align-items:flex-start;padding:6px 0;position:relative;min-height:36px;background:var(--bg);transition:transform .25s ease;z-index:1}
.task-item.removing,.note-entry.removing{opacity:0;transition:opacity .2s}
.task-bracket{width:3px;border-radius:2px;align-self:stretch;min-height:20px;margin-right:10px;flex-shrink:0;margin-top:2px}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-right:10px;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;background:transparent;-webkit-appearance:none;appearance:none}
.task-check.done{background:var(--subtext);border-color:var(--subtext)}
.task-check.done::after{content:'';width:6px;height:10px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);display:block}
.task-text-wrap{flex:1;min-width:0}
.task-line{display:flex;align-items:baseline;gap:5px;flex-wrap:wrap}
.task-text{font-size:16px;line-height:1.4;color:var(--text);word-break:break-word;white-space:pre-wrap;outline:none;font-family:inherit;background:transparent;border:none;padding:0;resize:none;caret-color:var(--text);flex:1;min-width:0;-webkit-user-select:text;user-select:text}
.task-text.done{text-decoration:line-through;color:var(--subtext)}
.badge-date{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;color:white;white-space:nowrap;flex-shrink:0;align-self:center;cursor:pointer}
.badge-repeat{font-size:10px;padding:2px 5px;border-radius:4px;background:rgba(0,0,0,.07);color:var(--subtext);white-space:nowrap;flex-shrink:0;align-self:center}

/* NOTE ENTRY */
.note-entry{display:flex;align-items:flex-start;padding:5px 0;background:var(--bg);z-index:1;position:relative}
.note-bracket{width:3px;border-radius:2px;align-self:stretch;min-height:16px;margin-right:10px;flex-shrink:0;margin-top:3px;opacity:.4}
.note-entry-text{flex:1;font-size:15px;line-height:1.45;color:var(--subtext);font-style:italic;outline:none;font-family:inherit;background:transparent;border:none;padding:0;resize:none;caret-color:var(--text);-webkit-user-select:text;user-select:text;min-width:0}

/* EDIT PANEL (swipe left) */
.edit-panel{position:absolute;left:0;top:0;bottom:0;width:80px;background:#FF9500;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:0;cursor:pointer;gap:2px}
.edit-panel-label{font-size:10px;color:white;font-weight:600}
.edit-panel svg{width:18px;height:18px;stroke:white}

/* ADD ROWS */
.add-task-row{display:flex;align-items:center;padding:8px 0;cursor:pointer;min-height:40px}
.add-task-ph{font-size:16px;color:#C7C7CC;margin-left:45px}
.add-note-row{display:flex;align-items:center;padding:4px 0;cursor:pointer;min-height:32px}
.add-note-ph{font-size:14px;color:#C7C7CC;margin-left:15px;font-style:italic}
.add-sublist-btn{display:flex;align-items:center;gap:6px;padding:10px 0 4px;cursor:pointer;background:none;border:none;font-family:inherit;font-size:13px;color:var(--subtext)}
.add-sublist-btn svg{width:16px;height:16px;flex-shrink:0}

/* INLINE */
#inline-row{display:none;align-items:flex-start;padding:7px 0;min-height:38px}
#inline-row.active{display:flex}
#inline-bracket{width:3px;border-radius:2px;min-height:20px;margin-right:10px;flex-shrink:0;margin-top:2px;align-self:stretch}
#inline-check-ph{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-right:10px;margin-top:2px}
#inline-input{flex:1;font-size:16px;font-family:inherit;border:none;outline:none;background:transparent;color:var(--text);caret-color:var(--text);padding:0;-webkit-user-select:text;user-select:text}
#inline-note-row{display:none;align-items:flex-start;padding:5px 0}
#inline-note-row.active{display:flex}
#inline-note-bracket{width:3px;border-radius:2px;min-height:16px;margin-right:10px;flex-shrink:0;margin-top:3px;opacity:.4}
#inline-note-input{flex:1;font-size:15px;font-family:inherit;border:none;outline:none;background:transparent;color:var(--subtext);caret-color:var(--text);padding:0;font-style:italic;-webkit-user-select:text;user-select:text}

/* BACKUP */
#backup-row{display:flex;gap:10px;padding:16px 16px 8px}
.backup-btn{flex:1;padding:10px 0;background:var(--card);border:none;border-radius:10px;font-size:13px;color:var(--subtext);font-family:inherit;cursor:pointer}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h)+var(--safe-b));padding-bottom:var(--safe-b);background:rgba(245,245,247,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-left:8px;padding-right:8px;z-index:100}
.nav-btn{width:44px;height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:12px;background:none;border:none;gap:3px}
.nav-btn svg{width:24px;height:24px}
.nav-btn:active{background:rgba(0,0,0,.06)}
.nav-btn.active svg{stroke:#007AFF}
.nav-btn.active .nav-label{color:#007AFF}
.nav-label{font-size:9px;color:var(--subtext)}

/* SIDE MENU */
#overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0);pointer-events:none;transition:background .3s}
#overlay.open{background:rgba(0,0,0,.3);pointer-events:all}
#side-menu{position:fixed;top:0;left:0;bottom:0;width:min(72vw,290px);background:var(--bg);z-index:201;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding-top:var(--safe-t)}
#side-menu.open{transform:translateX(0)}
#side-menu-header{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 12px}
#side-menu-title{font-size:20px;font-weight:700}
#btn-new-list{width:32px;height:32px;border-radius:50%;background:var(--text);border:none;cursor:pointer;color:white;font-size:20px;display:flex;align-items:center;justify-content:center}
#new-list-form{display:none;padding:0 16px 12px;gap:8px;flex-direction:column}
#new-list-form.show{display:flex}
#new-list-form input[type="text"]{border:none;background:var(--card);border-radius:8px;padding:9px 12px;font-size:15px;font-family:inherit;color:var(--text);outline:none;width:100%}
.new-list-row{display:flex;gap:8px;align-items:center}
#new-list-cat{flex:1;padding:9px 10px;border-radius:8px;background:var(--card);border:none;font-size:14px;font-family:inherit;color:var(--text);outline:none;-webkit-appearance:none}
.toggle-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
.toggle-btn.on{background:var(--text);border-color:var(--text)}
#save-list-btn{width:32px;height:32px;border-radius:50%;background:#34C759;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#save-list-btn svg{width:16px;height:16px}
#lists-scroll{flex:1;overflow-y:auto;padding-bottom:20px}
.list-item{display:flex;align-items:center;padding:9px 16px;cursor:pointer;gap:8px;transition:background .12s}
.list-item.sub{padding-left:30px}
.list-item.active{background:rgba(0,0,0,.06)}
.list-bracket{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.list-name{font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-count{font-size:12px;color:var(--subtext)}
.collapse-btn{width:20px;height:20px;border:none;background:none;cursor:pointer;font-size:11px;color:var(--subtext);display:flex;align-items:center;justify-content:center;transition:transform .2s;flex-shrink:0}
.collapse-btn.open{transform:rotate(90deg)}

/* MODALS */
.modal-wrap{position:fixed;inset:0;z-index:300;display:none;align-items:flex-end;background:rgba(0,0,0,.4)}
.modal-wrap.show{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;padding:20px 20px calc(16px+var(--safe-b));animation:slideUp .28s cubic-bezier(.4,0,.2,1);max-height:88vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.field-input{width:100%;padding:12px;border-radius:12px;background:var(--bg);border:none;outline:none;font-size:16px;font-family:inherit;color:var(--text);-webkit-appearance:none}
.field-input::placeholder{color:#C7C7CC}
.cat-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cat-chip{padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;border:2px solid transparent;color:white;font-weight:500;white-space:nowrap}
.cat-chip.selected{border-color:rgba(0,0,0,.25)}
.cat-chip[data-cat="none"]{color:var(--subtext);border-color:var(--border);background:var(--bg)!important}
.cat-chip[data-cat="none"].selected{border-color:var(--subtext)}
input[type="date"],input[type="time"]{color:var(--text);background:var(--bg);-webkit-appearance:none;font-family:inherit;font-size:16px;border:none;outline:none;padding:12px;border-radius:12px;width:100%}
.repeat-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.repeat-row input[type="number"]{width:60px;padding:10px 8px;border-radius:10px;background:var(--bg);border:none;outline:none;font-size:16px;text-align:center;font-family:inherit;color:var(--text)}
.modal-actions{display:flex;gap:10px;margin-top:14px}
.btn-cancel{flex:1;padding:14px;border-radius:14px;font-size:16px;font-family:inherit;font-weight:600;border:none;cursor:pointer;background:var(--bg);color:var(--subtext)}
.btn-save{flex:1;padding:14px;border-radius:14px;font-size:16px;font-family:inherit;font-weight:600;border:none;cursor:pointer;background:var(--text);color:white}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-size:17px;font-weight:600}
.cal-nav-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:18px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;font-size:11px;color:var(--subtext);padding:4px 0 10px;font-weight:500}
.cal-day{font-size:14px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;margin:1px auto;width:36px;min-height:38px;padding:2px 0;transition:background .12s}
.cal-day:active{background:var(--border)}
.cal-day.today{background:var(--text);color:white;border-radius:50%}
.cal-day.sel{background:var(--border)}
.cal-day.other-month{color:var(--border);pointer-events:none}
.cal-day-num{line-height:1}
.cal-dots{display:flex;gap:2px;margin-top:2px;justify-content:center;max-width:30px;flex-wrap:wrap}
.cal-dot{width:4px;height:4px;border-radius:50%}
.cal-day.has-note::before{content:'';position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 7px 7px 0;border-color:transparent #F48FB1 transparent transparent}
.cal-day.today.has-note::before{border-color:transparent white transparent transparent}
#cal-note-area{margin-top:14px;display:none}
#cal-note-area.show{display:block}
#cal-note-label{font-size:12px;color:var(--subtext);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
#cal-note-text{width:100%;background:#FFFDE7;border:none;border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;color:#555;outline:none;resize:none;min-height:56px;line-height:1.45;-webkit-user-select:text;user-select:text}

/* TIMELINE VIEW */
#timeline-view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(var(--nav-h)+var(--safe-b)+16px)}
#timeline-view.active{display:block}
.tl-entry{display:flex;gap:0;min-height:60px;border-bottom:1px solid var(--border)}
.tl-date-col{width:72px;flex-shrink:0;padding:12px 10px 12px 16px;display:flex;flex-direction:column;align-items:flex-start;border-right:2px solid var(--border);position:relative}
.tl-dot{width:10px;height:10px;border-radius:50%;background:#F48FB1;position:absolute;right:-6px;top:18px;border:2px solid var(--bg)}
.tl-day{font-size:20px;font-weight:300;color:var(--text);line-height:1}
.tl-month{font-size:11px;color:var(--subtext);margin-top:2px}
.tl-weekday{font-size:10px;color:var(--subtext)}
.tl-note-col{flex:1;padding:12px 16px}
.tl-note-text{width:100%;font-size:15px;font-family:inherit;color:var(--text);line-height:1.5;background:transparent;border:none;outline:none;resize:none;min-height:36px;caret-color:var(--text);-webkit-user-select:text;user-select:text}
.tl-note-placeholder{font-size:15px;color:#C7C7CC;line-height:1.5}
#tl-add-btn{display:flex;align-items:center;gap:8px;padding:14px 16px;cursor:pointer;background:none;border:none;font-family:inherit;font-size:15px;color:var(--subtext);width:100%}
#tl-add-btn svg{width:20px;height:20px;flex-shrink:0}

/* NOTE MODAL */
#note-modal-title{font-size:16px;font-weight:600;margin-bottom:12px;color:#888}
#note-textarea{width:100%;border:none;outline:none;background:transparent;font-size:17px;font-family:inherit;color:var(--text);line-height:1.5;resize:none;min-height:120px;-webkit-user-select:text;user-select:text;caret-color:var(--text)}
#note-textarea::placeholder{color:#C8B878}

/* CTX */
#cat-ctx,#list-ctx-menu{position:fixed;z-index:500;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:14px;padding:6px 0;box-shadow:0 8px 32px rgba(0,0,0,.16);min-width:180px;display:none}
.ctx-item{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:14px;cursor:pointer}
.ctx-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#view-title{font-size:13px;color:var(--subtext);padding:4px 16px 2px;font-weight:400}
#toast{position:fixed;bottom:calc(var(--nav-h)+var(--safe-b)+12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:white;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s,transform .25s;z-index:600;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-date"></div>
    <div id="header-list-name"></div>
    <button id="note-btn" onclick="openNoteModal()">📝</button>
  </div>
  <div id="note-card-wrap">
    <button id="note-card-toggle" onclick="toggleNoteCard()">
      <span id="note-card-arrow">▶</span>
      <span id="note-card-toggle-label">Заметка</span>
    </button>
    <div id="note-card"></div>
  </div>

  <!-- TASKS MAIN VIEW -->
  <div id="main">
    <div id="view-title" style="display:none"></div>
    <div id="task-list">
      <div id="inline-row"><div id="inline-bracket"></div><div id="inline-check-ph"></div><input id="inline-input" type="text" placeholder="Новая задача…" autocomplete="off" autocorrect="off"></div>
      <div id="inline-note-row"><div id="inline-note-bracket"></div><input id="inline-note-input" type="text" placeholder="Запись…" autocomplete="off"></div>
    </div>
    <div id="backup-row">
      <button class="backup-btn" onclick="backupData()">↓ Резервная копия</button>
      <button class="backup-btn" onclick="restoreData()">↑ Восстановить</button>
    </div>
  </div>

  <!-- TIMELINE VIEW -->
  <div id="timeline-view">
    <button id="tl-add-btn" onclick="addTimelineEntry()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Добавить запись
    </button>
    <div id="timeline-list"></div>
  </div>
</div>

<!-- NAV: меню | дом | календарь | хронология -->
<nav id="nav">
  <button class="nav-btn" onclick="toggleMenu()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    <span class="nav-label">Списки</span>
  </button>
  <button class="nav-btn active" id="btn-home" onclick="goHome()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="nav-label">Сегодня</span>
  </button>
  <button class="nav-btn" id="btn-cal" onclick="openCalendar()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="nav-label">Календарь</span>
  </button>
  <button class="nav-btn" id="btn-timeline" onclick="openTimeline()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span class="nav-label">Хронология</span>
  </button>
</nav>

<script>
// ══ CATEGORIES ══
const CATS={event:{label:'Мероприятие',color:'#FF8C42'},health:{label:'Здоровье',color:'#F06292'},home:{label:'Бытовые',color:'#64B5F6'},groceries:{label:'Продукты',color:'#FFD54F'},shopping:{label:'Покупки',color:'#AB47BC'},work:{label:'Работа',color:'#90A4AE'},study:{label:'Учёба',color:'#5C8EE8'},hobby:{label:'Хобби',color:'#66BB6A'},beauty:{label:'Красота',color:'#0ABAB5'},none:{label:'Без кат.',color:'#C8C8C8'}};
const PRIO=['event','health','beauty'];
// Lists that allow sublists (extended to include groceries)
const DEF=[{id:'today',name:'Дела на сегодня',cat:'none',locked:true,parentId:null},{id:'groceries',name:'Продукты',cat:'groceries',locked:true,parentId:null},{id:'events',name:'Мероприятия',cat:'event',locked:true,parentId:null},{id:'health',name:'Здоровье',cat:'health',locked:true,parentId:null},{id:'beauty',name:'Красота',cat:'beauty',locked:true,parentId:null}];
// Lists where sublist creation is allowed (custom + groceries)
const SUBLIST_ALLOWED_DEFAULTS=['groceries'];

// ══ STATE ══
let S={tasks:[],lists:JSON.parse(JSON.stringify(DEF)),currentList:'today',viewDate:null,notes:{},collapsed:{},timeline:[]};

function save(){localStorage.setItem('tdv6',JSON.stringify(S));}
function load(){
  const r=localStorage.getItem('tdv6')||localStorage.getItem('tdv5')||localStorage.getItem('todo_v4')||localStorage.getItem('todo_v3')||localStorage.getItem('todo_v2');
  if(r){try{S=JSON.parse(r);}catch(e){}}
  if(!S.notes)S.notes={};if(!S.collapsed)S.collapsed={};if(!S.timeline)S.timeline=[];
  DEF.forEach(d=>{if(!S.lists.find(l=>l.id===d.id))S.lists.unshift(d);});
  S.lists.forEach(l=>{if(l.parentId===undefined)l.parentId=null;});
  S.tasks.forEach(t=>{if(!t.type)t.type='task';if(!t.doneOn)t.doneOn={};});
  // Always start on today
  S.currentList='today';S.viewDate=null;
  migrate();
}

// ══ UTILS ══
function fmtDate(d){return d.toISOString().split('T')[0];}
function today(){return fmtDate(new Date());}

function migrate(){
  // No auto-migrate for repeating tasks — handled by occurrence logic
  save();
}

// Get the "active occurrence date" of a recurring task for a given view date
// Returns the occurrence date string if the task should appear on viewDs, or null
function getOccurrenceDate(task, viewDs){
  if(!task.date) return null;
  const r=parseInt(task.repeat)||0;
  const startDs=task.date;
  if(r===0){
    // No repeat: only show on its exact date
    return startDs===viewDs?startDs:null;
  }
  // Recurring: find if viewDs is a valid occurrence
  const startD=new Date(startDs+'T00:00:00');
  const viewD=new Date(viewDs+'T00:00:00');
  if(viewD<startD) return null;
  const diffDays=Math.round((viewD-startD)/(86400000));
  if(diffDays%r===0) return viewDs;
  return null;
}

// Is a task "done" for a specific date occurrence?
function isDoneOn(task, ds){
  return !!(task.doneOn && task.doneOn[ds]);
}

function toggleDoneOn(taskId, ds){
  const t=S.tasks.find(t=>t.id===taskId);
  if(!t)return;
  if(!t.doneOn)t.doneOn={};
  t.doneOn[ds]=!t.doneOn[ds];
  save();renderTasks();
}

function fmtH(ds){
  const d=ds?new Date(ds+'T00:00:00'):new Date();
  const m=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return d.getDate()+' '+m[d.getMonth()];
}
function fmtW(ds){
  const d=ds?new Date(ds+'T00:00:00'):new Date();
  return ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'][d.getDay()];
}
function fmtWshort(ds){
  const d=ds?new Date(ds+'T00:00:00'):new Date();
  return ['вс','пн','вт','ср','чт','пт','сб'][d.getDay()];
}
function curList(){return S.lists.find(l=>l.id===S.currentList)||S.lists[0];}

// ══ HEADER ══
let noteCardOpen=false;
function renderHeader(){
  document.getElementById('header-date').textContent='Сегодня, '+fmtH(S.viewDate)+' · '+fmtW(S.viewDate);
  const cl=curList();
  const ne=document.getElementById('header-list-name');
  ne.textContent=cl.name;
  ne.style.color=cl.cat==='none'?'var(--text)':(CATS[cl.cat]||CATS.none).color;
  const key=S.viewDate||today();
  const noteBtn=document.getElementById('note-btn');
  // Note button only on today main view
  const isToday=cl.id==='today'&&!S.viewDate;
  noteBtn.classList.toggle('visible',isToday);
  noteBtn.classList.toggle('has-note',!!(S.notes[key]&&S.notes[key].trim()));
  const wrap=document.getElementById('note-card-wrap');
  const card=document.getElementById('note-card');
  const nt=S.notes[key];
  if(isToday&&nt&&nt.trim()){wrap.classList.add('show');card.textContent=nt;card.classList.toggle('open',noteCardOpen);document.getElementById('note-card-arrow').classList.toggle('open',noteCardOpen);}
  else{wrap.classList.remove('show');card.classList.remove('open');}
}
function toggleNoteCard(){noteCardOpen=!noteCardOpen;document.getElementById('note-card').classList.toggle('open',noteCardOpen);document.getElementById('note-card-arrow').classList.toggle('open',noteCardOpen);}

// ══ GET TASKS FOR VIEW ══
function tasksOnDate(ds){
  // Returns tasks visible on a given date, with their occurrence date
  const result=[];
  S.tasks.forEach(t=>{
    if(t.type==='note'&&t.date===ds){result.push({task:t,occDs:ds});return;}
    if(t.type!=='task')return;
    const r=parseInt(t.repeat)||0;
    if(r===0){if(t.date===ds)result.push({task:t,occDs:ds});}
    else{const occ=getOccurrenceDate(t,ds);if(occ)result.push({task:t,occDs:occ});}
  });
  return result;
}

function getViewItems(){
  const t=today();const cl=curList();
  if(S.viewDate) return tasksOnDate(S.viewDate);
  if(cl.id==='today'){
    const d3=new Date();d3.setDate(d3.getDate()+3);const in3=fmtDate(d3);
    const result=[];
    S.tasks.forEach(tk=>{
      if(['groceries','shopping'].includes(tk.cat)&&tk.listId!=='today')return;
      const r=parseInt(tk.repeat)||0;
      if(r===0){
        if(tk.date===t)result.push({task:tk,occDs:t});
        else if(!isDoneOn(tk,tk.date||t)&&PRIO.includes(tk.cat)&&tk.date&&tk.date>t&&tk.date<=in3)result.push({task:tk,occDs:tk.date});
      } else {
        const occ=getOccurrenceDate(tk,t);
        if(occ)result.push({task:tk,occDs:t});
        // Also show priority recurring tasks up to 3 days ahead
        else if(PRIO.includes(tk.cat)){
          const d1=new Date();d1.setDate(d1.getDate()+1);const d2=new Date();d2.setDate(d2.getDate()+2);const d3b=new Date();d3b.setDate(d3b.getDate()+3);
          [fmtDate(d1),fmtDate(d2),fmtDate(d3b)].forEach(ds=>{const o=getOccurrenceDate(tk,ds);if(o&&!isDoneOn(tk,ds))result.push({task:tk,occDs:ds});});
        }
      }
    });
    return result;
  }
  return S.tasks.filter(tk=>tk.listId===cl.id).map(tk=>({task:tk,occDs:tk.date||t}));
}

// ══ SORT ══
function sortItems(items){
  return items.sort((a,b)=>{
    const pa=PRIO.includes(a.task.cat)?0:1,pb=PRIO.includes(b.task.cat)?0:1;
    if(pa!==pb)return pa-pb;
    // Sort by date then time
    const da=a.occDs||'9999',db=b.occDs||'9999';
    if(da!==db)return da.localeCompare(db);
    const ta=a.task.time||'99:99',tb=b.task.time||'99:99';
    return ta.localeCompare(tb);
  });
}

// ══ RENDER ══
let currentView='tasks'; // 'tasks' | 'timeline'
function setView(view){
  currentView=view;
  document.getElementById('main').style.display=view==='tasks'?'block':'none';
  document.getElementById('timeline-view').classList.toggle('active',view==='timeline');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(view==='timeline')document.getElementById('btn-timeline').classList.add('active');
  else document.getElementById('btn-home').classList.add('active');
}

function renderTasks(){
  if(currentView==='timeline')return;
  const cont=document.getElementById('task-list');
  Array.from(cont.children).forEach(c=>{if(c.id!=='inline-row'&&c.id!=='inline-note-row')c.remove();});
  const items=sortItems(getViewItems());
  const vt=document.getElementById('view-title');
  if(S.viewDate&&S.viewDate!==today()){vt.style.display='block';vt.textContent=fmtH(S.viewDate)+' · '+fmtW(S.viewDate);}
  else vt.style.display='none';
  const inR=document.getElementById('inline-row');
  items.forEach(({task,occDs})=>cont.insertBefore(task.type==='note'?buildNoteEl(task):buildTaskEl(task,occDs),inR));
  // add-task row
  const ar=document.createElement('div');ar.className='add-task-row';ar.innerHTML='<span class="add-task-ph">+ Добавить задачу\u2026</span>';ar.onclick=showInline;cont.appendChild(ar);
  // add-note row
  const nr=document.createElement('div');nr.className='add-note-row';nr.innerHTML='<span class="add-note-ph">+ Запись без чекбокса\u2026</span>';nr.onclick=showInlineNote;cont.appendChild(nr);
  // sublist button
  const cl=curList();
  const canAddSublist=!DEF.find(d=>d.id===cl.id)||SUBLIST_ALLOWED_DEFAULTS.includes(cl.id);
  if(canAddSublist){const sb=document.createElement('button');sb.className='add-sublist-btn';sb.innerHTML='<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Добавить подсписок';sb.onclick=()=>openSublistModal(cl.id);cont.appendChild(sb);}
  renderLists();renderHeader();
}

// ══ SWIPE HELPER (both directions) ══
function addSwipe(el,wrap,onLeft,onRight){
  let sx=0,sy=0,sw=0,tr=false; // sw: -1=leftOpen, 1=rightOpen, 0=closed
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;tr=true;},{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!tr)return;
    const dx=e.touches[0].clientX-sx,dy=Math.abs(e.touches[0].clientY-sy);
    if(dy>12&&Math.abs(dx)<dy){tr=false;return;}
    el.style.transition='none';
    if(dx<0)el.style.transform=`translateX(${Math.max(dx,-88)}px)`;
    else if(dx>0)el.style.transform=`translateX(${Math.min(dx,88)}px)`;
  },{passive:true});
  el.addEventListener('touchend',e=>{
    if(!tr)return;tr=false;
    const dx=e.changedTouches[0].clientX-sx;el.style.transition='';
    if(dx<-44){el.style.transform='translateX(-80px)';sw=-1;}
    else if(dx>44){el.style.transform='translateX(80px)';sw=1;}
    else{el.style.transform='';sw=0;}
  });
  document.addEventListener('touchstart',e=>{
    if(sw!==0&&!wrap.contains(e.target)){
      if(sw===-1&&onLeft)onLeft();
      if(sw===1&&onRight)onRight();
      el.style.transform='';sw=0;
    }
  },{passive:true});
}

function removeItem(id,el){
  el.classList.add('removing');
  setTimeout(()=>{S.tasks=S.tasks.filter(t=>t.id!==id);save();renderTasks();},220);
}

function buildTaskEl(task,occDs){
  const cat=CATS[task.cat]||CATS.none;
  const wrap=document.createElement('div');wrap.className='swipe-wrap';
  // Left bg: edit (orange)
  const editBg=document.createElement('div');editBg.className='edit-panel';
  editBg.innerHTML='<svg fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><span class="edit-panel-label">Изменить</span>';
  // Right bg: delete
  const delBg=document.createElement('div');delBg.className='del-right-bg';delBg.textContent='Удалить';
  const item=document.createElement('div');item.className='task-item';
  const br=document.createElement('div');br.className='task-bracket';br.style.background=cat.color;
  const done=isDoneOn(task,occDs);
  const ck=document.createElement('button');ck.className='task-check'+(done?' done':'');
  ck.onclick=e=>{e.stopPropagation();toggleDoneOn(task.id,occDs);};
  const tw=document.createElement('div');tw.className='task-text-wrap';
  const ln=document.createElement('div');ln.className='task-line';
  const ta=document.createElement('textarea');ta.className='task-text'+(done?' done':'');ta.value=task.text;ta.rows=1;ta.style.overflow='hidden';
  const rsz=()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';};ta.oninput=()=>{rsz();task.text=ta.value;save();};ta.onfocus=rsz;setTimeout(rsz,0);
  ln.appendChild(ta);
  if(PRIO.includes(task.cat)&&task.date){const bd=document.createElement('span');bd.className='badge-date';bd.style.background=cat.color;bd.textContent=fmtH(occDs||task.date)+(task.time?' '+task.time:'');ln.appendChild(bd);}
  const rp=parseInt(task.repeat)||0;if(rp>0){const rb=document.createElement('span');rb.className='badge-repeat';rb.textContent='\u21bb'+rp+'\u0434';ln.appendChild(rb);}
  tw.appendChild(ln);
  let lp=null;item.addEventListener('touchstart',e=>{lp=setTimeout(()=>{lp=null;showCatCtx(task,e.touches[0]);},520);},{passive:true});item.addEventListener('touchend',()=>{if(lp){clearTimeout(lp);lp=null;}});item.addEventListener('touchmove',()=>{if(lp){clearTimeout(lp);lp=null;}},{passive:true});
  item.appendChild(br);item.appendChild(ck);item.appendChild(tw);
  addSwipe(item,wrap,
    ()=>openEditModal(task),     // swipe left = edit
    ()=>removeItem(task.id,item) // swipe right = delete
  );
  wrap.appendChild(editBg);wrap.appendChild(delBg);wrap.appendChild(item);
  return wrap;
}

function buildNoteEl(entry){
  const cl=curList();const cat=CATS[cl.cat]||CATS.none;
  const wrap=document.createElement('div');wrap.className='swipe-wrap';
  const delBg=document.createElement('div');delBg.className='del-right-bg';delBg.textContent='Удалить';
  const ne=document.createElement('div');ne.className='note-entry';
  const br=document.createElement('div');br.className='note-bracket';br.style.background=cat.color;
  const ta=document.createElement('textarea');ta.className='note-entry-text';ta.value=entry.text;ta.rows=1;ta.style.overflow='hidden';
  const rsz=()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';};ta.oninput=()=>{rsz();entry.text=ta.value;save();};ta.onfocus=rsz;setTimeout(rsz,0);
  ne.appendChild(br);ne.appendChild(ta);
  addSwipe(ne,wrap,null,()=>removeItem(entry.id,ne));
  wrap.appendChild(delBg);wrap.appendChild(ne);
  return wrap;
}

// ══ EDIT MODAL (swipe left on task) ══
let editingTask=null;
function openEditModal(task){
  editingTask=task;
  document.getElementById('edit-modal-title').textContent=task.text.slice(0,30)+(task.text.length>30?'…':'');
  document.getElementById('edit-date').value=task.date||today();
  document.getElementById('edit-time').value=task.time||'';
  document.getElementById('edit-repeat').value=parseInt(task.repeat)||0;
  document.getElementById('edit-modal').classList.add('show');
}
function closeEditModal(){document.getElementById('edit-modal').classList.remove('show');editingTask=null;}
function saveEditModal(){
  if(!editingTask)return;
  editingTask.date=document.getElementById('edit-date').value||today();
  editingTask.time=document.getElementById('edit-time').value;
  editingTask.repeat=document.getElementById('edit-repeat').value;
  save();closeEditModal();renderTasks();showToast('Задача обновлена');
}
document.getElementById('edit-modal').addEventListener('click',e=>{if(e.target===document.getElementById('edit-modal'))closeEditModal();});

// ══ INLINE ══
let inlineActive=false,inlineNoteActive=false;
function setupInline(){
  document.getElementById('inline-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commitInline();}});
  document.getElementById('inline-note-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commitInlineNote();}});
  document.addEventListener('touchstart',e=>{
    if(inlineActive&&!document.getElementById('inline-row').contains(e.target))commitInline();
    if(inlineNoteActive&&!document.getElementById('inline-note-row').contains(e.target))commitInlineNote();
  },{passive:true});
  document.addEventListener('mousedown',e=>{
    if(inlineActive&&!document.getElementById('inline-row').contains(e.target))commitInline();
    if(inlineNoteActive&&!document.getElementById('inline-note-row').contains(e.target))commitInlineNote();
  });
}
function showInline(){const cl=curList();const ck=cl.cat==='none'?'home':cl.cat;document.getElementById('inline-bracket').style.background=(CATS[ck]||CATS.none).color;document.getElementById('inline-input').value='';document.getElementById('inline-row').classList.add('active');inlineActive=true;document.getElementById('inline-input').focus();}
function hideInline(){document.getElementById('inline-row').classList.remove('active');inlineActive=false;}
function commitInline(){const text=document.getElementById('inline-input').value.trim();if(text){const cl=curList();const ck=cl.cat==='none'?'home':cl.cat;let lid=cl.id;if(PRIO.includes(ck)){const ml=S.lists.find(l=>l.cat===ck);if(ml)lid=ml.id;}S.tasks.push({id:Date.now()+'',text,cat:ck,date:S.viewDate||today(),time:'',repeat:0,done:false,doneOn:{},listId:lid,type:'task'});save();}hideInline();renderTasks();}
function showInlineNote(){const cl=curList();const ck=cl.cat==='none'?'home':cl.cat;document.getElementById('inline-note-bracket').style.background=(CATS[ck]||CATS.none).color;document.getElementById('inline-note-input').value='';document.getElementById('inline-note-row').classList.add('active');inlineNoteActive=true;document.getElementById('inline-note-input').focus();}
function hideInlineNote(){document.getElementById('inline-note-row').classList.remove('active');inlineNoteActive=false;}
function commitInlineNote(){const text=document.getElementById('inline-note-input').value.trim();if(text){const cl=curList();const ck=cl.cat==='none'?'home':cl.cat;S.tasks.push({id:Date.now()+'',text,cat:ck,date:S.viewDate||today(),time:'',repeat:0,done:false,doneOn:{},listId:cl.id,type:'note'});save();}hideInlineNote();renderTasks();}

// ══ GO HOME ══
function goHome(){
  S.viewDate=null;S.currentList='today';save();
  setView('tasks');renderHeader();renderTasks();
}

// ══ ADD TASK MODAL ══
let addCat='home';
function openAddTask(){const cl=curList();addCat=cl.cat==='none'?'home':cl.cat;document.getElementById('add-task-text').value='';document.getElementById('add-task-date').value=S.viewDate||today();document.getElementById('add-task-time').value='';document.getElementById('add-repeat').value=0;renderCatChips();document.getElementById('add-modal').classList.add('show');setTimeout(()=>document.getElementById('add-task-text').focus(),320);}
function closeAddTask(){document.getElementById('add-modal').classList.remove('show');}
function renderCatChips(){const w=document.getElementById('add-cat-chips');w.innerHTML='';Object.entries(CATS).forEach(([k,c])=>{const ch=document.createElement('div');ch.className='cat-chip'+(addCat===k?' selected':'');ch.dataset.cat=k;ch.textContent=c.label;if(k!=='none')ch.style.background=c.color;ch.onclick=()=>{addCat=k;renderCatChips();};w.appendChild(ch);});}
function saveTask(){const text=document.getElementById('add-task-text').value.trim();if(!text)return;const date=document.getElementById('add-task-date').value||today();const time=document.getElementById('add-task-time').value;const repeat=document.getElementById('add-repeat').value;const cl=curList();let lid=cl.id;if(PRIO.includes(addCat)){const ml=S.lists.find(l=>l.cat===addCat);if(ml)lid=ml.id;}S.tasks.push({id:Date.now()+'',text,cat:addCat,date,time,repeat,done:false,doneOn:{},listId:lid,type:'task'});save();closeAddTask();renderTasks();showToast('Задача добавлена');}
document.getElementById('add-task-text').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();saveTask();}});
document.getElementById('add-modal').addEventListener('click',e=>{if(e.target===document.getElementById('add-modal'))closeAddTask();});

// ══ SUBLIST ══
let subParentId=null;
function openSublistModal(pid){subParentId=pid;document.getElementById('sublist-name').value='';const sel=document.getElementById('sublist-cat');if(!sel.options.length)Object.entries(CATS).forEach(([k,c])=>{const o=document.createElement('option');o.value=k;o.textContent=c.label;sel.appendChild(o);});document.getElementById('sublist-modal').classList.add('show');setTimeout(()=>document.getElementById('sublist-name').focus(),300);}
function closeSublistModal(){document.getElementById('sublist-modal').classList.remove('show');}
function saveSublist(){const name=document.getElementById('sublist-name').value.trim();if(!name)return;const cat=document.getElementById('sublist-cat').value;S.lists.push({id:'l'+Date.now(),name,cat,locked:false,parentId:subParentId});closeSublistModal();save();renderLists();showToast('Подсписок создан');}
document.getElementById('sublist-modal').addEventListener('click',e=>{if(e.target===document.getElementById('sublist-modal'))closeSublistModal();});

// ══ NOTES ══
function openNoteModal(){const key=S.viewDate||today();document.getElementById('note-modal-title').textContent='Заметка \u00b7 '+fmtH(key);document.getElementById('note-textarea').value=S.notes[key]||'';document.getElementById('note-modal').classList.add('show');setTimeout(()=>document.getElementById('note-textarea').focus(),300);}
function closeNoteModal(){document.getElementById('note-modal').classList.remove('show');}
function saveNote(){const key=S.viewDate||today();S.notes[key]=document.getElementById('note-textarea').value;save();closeNoteModal();renderHeader();renderTasks();showToast('Заметка сохранена');}
document.getElementById('note-modal').addEventListener('click',e=>{if(e.target===document.getElementById('note-modal'))closeNoteModal();});

// ══ TIMELINE ══
function openTimeline(){setView('timeline');renderTimeline();document.getElementById('header-list-name').textContent='Хронология';document.getElementById('header-date').textContent='Заметки по датам';document.getElementById('note-card-wrap').classList.remove('show');document.getElementById('note-btn').classList.remove('visible');}

function renderTimeline(){
  const list=document.getElementById('timeline-list');list.innerHTML='';
  // Sort by date desc (newest first)
  const entries=[...S.timeline].sort((a,b)=>b.date.localeCompare(a.date));
  entries.forEach(entry=>{
    const el=buildTimelineEntry(entry);list.appendChild(el);
  });
}

function buildTimelineEntry(entry){
  const wrap=document.createElement('div');wrap.className='tl-entry';
  // Date column
  const dateCol=document.createElement('div');dateCol.className='tl-date-col';
  const d=new Date(entry.date+'T00:00:00');
  const dayEl=document.createElement('div');dayEl.className='tl-day';dayEl.textContent=d.getDate();
  const months=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const monthEl=document.createElement('div');monthEl.className='tl-month';monthEl.textContent=months[d.getMonth()]+' '+d.getFullYear();
  const wdEl=document.createElement('div');wdEl.className='tl-weekday';wdEl.textContent=fmtWshort(entry.date);
  const dot=document.createElement('div');dot.className='tl-dot';
  dateCol.appendChild(dayEl);dateCol.appendChild(monthEl);dateCol.appendChild(wdEl);dateCol.appendChild(dot);
  // Note column
  const noteCol=document.createElement('div');noteCol.className='tl-note-col';
  const ta=document.createElement('textarea');ta.className='tl-note-text';ta.value=entry.text||'';ta.placeholder='Нажмите, чтобы редактировать…';ta.rows=2;ta.style.overflow='hidden';
  const rsz=()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';};
  ta.oninput=()=>{rsz();entry.text=ta.value;save();};ta.onfocus=rsz;setTimeout(rsz,0);
  // Swipe right to delete
  addSwipe(wrap,wrap,null,()=>{S.timeline=S.timeline.filter(e=>e.id!==entry.id);save();renderTimeline();});
  noteCol.appendChild(ta);
  wrap.appendChild(dateCol);wrap.appendChild(noteCol);
  return wrap;
}

function addTimelineEntry(){
  const entry={id:Date.now()+'',date:today(),text:''};
  S.timeline.unshift(entry);save();renderTimeline();
  // Focus the new entry's textarea
  setTimeout(()=>{const ta=document.querySelector('.tl-note-text');if(ta)ta.focus();},100);
}

// ══ LISTS ══
function renderLists(){
  const sel=document.getElementById('new-list-cat');if(!sel.options.length)Object.entries(CATS).forEach(([k,c])=>{const o=document.createElement('option');o.value=k;o.textContent=c.label;sel.appendChild(o);});
  const w=document.getElementById('lists-scroll');w.innerHTML='';
  S.lists.filter(l=>!l.parentId).forEach(l=>renderListRow(l,w,false));
}
function renderListRow(l,w,isSub){
  const cat=CATS[l.cat]||CATS.none;const children=S.lists.filter(c=>c.parentId===l.id);const isColl=S.collapsed[l.id];
  const item=document.createElement('div');item.className='list-item'+(isSub?' sub':'')+(l.id===S.currentList&&!S.viewDate&&currentView==='tasks'?' active':'');
  const br=document.createElement('div');br.className='list-bracket';br.style.background=cat.color;
  const nm=document.createElement('span');nm.className='list-name';nm.textContent=l.name;
  const cnt=S.tasks.filter(t=>t.listId===l.id&&!t.doneOn?.[today()]).length;
  const bg=document.createElement('span');bg.className='list-count';if(cnt>0)bg.textContent=cnt;
  item.appendChild(br);item.appendChild(nm);item.appendChild(bg);
  if(children.length){const cb=document.createElement('button');cb.className='collapse-btn'+(isColl?'':' open');cb.textContent='\u25b6';cb.onclick=e=>{e.stopPropagation();S.collapsed[l.id]=!isColl;save();renderLists();};item.appendChild(cb);}
  item.onclick=()=>{S.viewDate=null;S.currentList=l.id;closeMenu();save();setView('tasks');renderHeader();renderTasks();};
  let lp=null;item.addEventListener('touchstart',e=>{lp=setTimeout(()=>{lp=null;if(!DEF.find(d=>d.id===l.id))showListCtx(l,e.touches[0]);},520);},{passive:true});item.addEventListener('touchend',()=>{if(lp){clearTimeout(lp);lp=null;}});
  w.appendChild(item);
  if(children.length&&!isColl)children.forEach(c=>renderListRow(c,w,true));
}
function showListCtx(list,touch){const menu=document.getElementById('list-ctx-menu');menu.innerHTML='';Object.entries(CATS).forEach(([k,c])=>{const it=document.createElement('div');it.className='ctx-item';const dot=document.createElement('span');dot.className='ctx-dot';dot.style.background=c.color;it.appendChild(dot);it.appendChild(document.createTextNode(c.label));it.onclick=()=>{list.cat=k;save();renderLists();menu.style.display='none';};menu.appendChild(it);});posCtx(menu,touch);menu.style.display='block';setTimeout(()=>document.addEventListener('click',()=>{menu.style.display='none';},{once:true}),10);}
let lockEnabled=false;
function toggleLock(){lockEnabled=!lockEnabled;const b=document.getElementById('lock-btn');b.textContent=lockEnabled?'\uD83D\uDD12':'\uD83D\uDD13';b.classList.toggle('on',lockEnabled);}
let newListOpen=false;
function toggleNewListForm(){newListOpen=!newListOpen;document.getElementById('new-list-form').classList.toggle('show',newListOpen);if(newListOpen){renderLists();setTimeout(()=>document.getElementById('new-list-name').focus(),80);}}
function saveNewList(){const name=document.getElementById('new-list-name').value.trim();if(!name)return;const cat=document.getElementById('new-list-cat').value;S.lists.push({id:'l'+Date.now(),name,cat,locked:lockEnabled,parentId:null});lockEnabled=false;document.getElementById('lock-btn').textContent='\uD83D\uDD13';document.getElementById('lock-btn').classList.remove('on');document.getElementById('new-list-name').value='';newListOpen=false;document.getElementById('new-list-form').classList.remove('show');save();renderLists();}
function toggleMenu(){renderLists();document.getElementById('side-menu').classList.toggle('open');document.getElementById('overlay').classList.toggle('open');}
function closeMenu(){document.getElementById('side-menu').classList.remove('open');document.getElementById('overlay').classList.remove('open');}

// ══ CALENDAR ══
let calDate=new Date(),calSel=null;
function openCalendar(){calDate=new Date();calSel=null;renderCal();document.getElementById('cal-modal').classList.add('show');}
function closeCal(){document.getElementById('cal-modal').classList.remove('show');calSel=null;}
function calPrev(){calDate.setMonth(calDate.getMonth()-1);calSel=null;renderCal();}
function calNext(){calDate.setMonth(calDate.getMonth()+1);calSel=null;renderCal();}
function tasksOnDateFlat(ds){return tasksOnDate(ds).map(x=>x.task);}
function renderCal(){
  const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('cal-month-label').textContent=months[calDate.getMonth()]+' '+calDate.getFullYear();
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  ['\u041f\u043d','\u0412\u0442','\u0421\u0440','\u0427\u0442','\u041f\u0442','\u0421\u0431','\u0412\u0441'].forEach(d=>{const e=document.createElement('div');e.className='cal-dow';e.textContent=d;grid.appendChild(e);});
  const first=new Date(calDate.getFullYear(),calDate.getMonth(),1);const last=new Date(calDate.getFullYear(),calDate.getMonth()+1,0);const t=today();
  let dow=first.getDay();dow=dow===0?6:dow-1;for(let i=0;i<dow;i++){const b=document.createElement('div');b.className='cal-day other-month';grid.appendChild(b);}
  for(let d=1;d<=last.getDate();d++){
    const ds=`${calDate.getFullYear()}-${String(calDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el=document.createElement('div');el.className='cal-day';
    if(ds===t)el.classList.add('today');if(calSel===ds)el.classList.add('sel');if(S.notes[ds]&&S.notes[ds].trim())el.classList.add('has-note');
    const num=document.createElement('div');num.className='cal-day-num';num.textContent=d;el.appendChild(num);
    const dt=tasksOnDateFlat(ds);if(dt.length){const cats=[...new Set(dt.map(tk=>tk.cat))].slice(0,5);const dw=document.createElement('div');dw.className='cal-dots';cats.forEach(c=>{const dot=document.createElement('div');dot.className='cal-dot';dot.style.background=(CATS[c]||CATS.none).color;dw.appendChild(dot);});el.appendChild(dw);}
    el.onclick=()=>{calSel=ds;renderCal();};grid.appendChild(el);
  }
  const na=document.getElementById('cal-note-area');
  if(calSel){na.classList.add('show');const ta=document.getElementById('cal-note-text');ta.value=S.notes[calSel]||'';ta.onblur=()=>{if(calSel){S.notes[calSel]=ta.value;save();renderCal();}};}else na.classList.remove('show');
}
function openCalDay(){const ds=calSel;if(!ds){closeCal();return;}S.notes[ds]=document.getElementById('cal-note-text').value;save();closeCal();S.viewDate=ds;S.currentList='today';setView('tasks');renderHeader();renderTasks();}
document.getElementById('cal-modal').addEventListener('click',e=>{if(e.target===document.getElementById('cal-modal'))closeCal();});

// ══ CAT CTX ══
function showCatCtx(task,touch){const menu=document.getElementById('cat-ctx');menu.innerHTML='';Object.entries(CATS).forEach(([k,c])=>{const it=document.createElement('div');it.className='ctx-item';const dot=document.createElement('span');dot.className='ctx-dot';dot.style.background=c.color;it.appendChild(dot);it.appendChild(document.createTextNode(c.label));it.onclick=()=>{task.cat=k;save();renderTasks();menu.style.display='none';};menu.appendChild(it);});posCtx(menu,touch);menu.style.display='block';setTimeout(()=>document.addEventListener('click',()=>{menu.style.display='none';},{once:true}),10);}
function posCtx(menu,touch){const x=touch?touch.clientX:window.innerWidth/2,y=touch?touch.clientY:window.innerHeight/2;menu.style.left=Math.min(x,window.innerWidth-200)+'px';menu.style.top=Math.min(y,window.innerHeight-340)+'px';}

// ══ BACKUP ══
async function backupData(){const json=JSON.stringify(S,null,2),fn='tasks_'+today()+'.json';const blob=new Blob([json],{type:'application/json'});if(navigator.share){try{const f=new File([blob],fn,{type:'application/json'});if(navigator.canShare&&navigator.canShare({files:[f]})){await navigator.share({files:[f],title:'Резервная копия'});return;}}catch(e){if(e.name!=='AbortError')console.log(e);return;}}const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fn;document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},400);showToast('Файл сохранён');}
function restoreData(){document.getElementById('restore-input').click();}
function handleRestoreFile(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(data.tasks&&data.lists){S=data;if(!S.notes)S.notes={};if(!S.collapsed)S.collapsed={};if(!S.timeline)S.timeline=[];S.tasks.forEach(t=>{if(!t.doneOn)t.doneOn={};});save();renderHeader();renderTasks();showToast('Данные восстановлены');}else showToast('Неверный формат');}catch{showToast('Ошибка файла');}};reader.readAsText(file);e.target.value='';}

// ══ TOAST ══
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ══ INIT ══
load();renderCatChips();renderHeader();renderTasks();setupInline();
</script>
