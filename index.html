<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Задачи</title>
<style>
  :root {
    --cat-event: #FF8C42;
    --cat-health: #F06292;
    --cat-home: #64B5F6;
    --cat-groceries: #FFD54F;
    --cat-shopping: #AB47BC;
    --cat-work: #90A4AE;
    --cat-study: #5C8EE8;
    --cat-hobby: #66BB6A;
    --cat-none: #C8C8C8;
    --bg: #F5F5F7;
    --card: #FFFFFF;
    --text: #1C1C1E;
    --subtext: #8E8E93;
    --border: #E5E5EA;
    --accent: #1C1C1E;
    --nav-h: 68px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    color: var(--text);
    overflow: hidden;
    position: fixed;
    top: 0; left: 0;
  }

  /* ── APP SHELL ── */
  #app {
    display: flex; flex-direction: column;
    height: 100%; width: 100%;
    position: relative; overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    padding: calc(var(--safe-top) + 14px) 20px 10px;
    background: var(--bg);
    z-index: 10; flex-shrink: 0;
  }
  #header-date {
    font-size: 28px; font-weight: 700;
    letter-spacing: -0.5px; color: var(--text);
    line-height: 1.1;
  }
  #header-weekday {
    font-size: 13px; color: var(--subtext);
    font-weight: 400; margin-top: 2px;
  }

  /* ── MAIN CONTENT ── */
  #main {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 0 0 calc(var(--nav-h) + var(--safe-bottom) + 16px);
  }

  /* ── TASK LIST ── */
  #task-list {
    padding: 0 16px;
  }

  .task-item {
    display: flex; align-items: flex-start;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    position: relative;
    min-height: 44px;
    transition: opacity 0.2s;
  }
  .task-item:last-child { border-bottom: none; }

  .task-bracket {
    width: 3px; border-radius: 2px;
    align-self: stretch; min-height: 20px;
    margin-right: 10px; flex-shrink: 0;
    margin-top: 2px;
  }

  .task-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0; margin-right: 10px;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; cursor: pointer;
    background: transparent;
    -webkit-appearance: none; appearance: none;
    position: relative;
  }
  .task-check.done {
    background: var(--subtext);
    border-color: var(--subtext);
  }
  .task-check.done::after {
    content: '';
    width: 6px; height: 10px;
    border: 2px solid white;
    border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
    display: block;
  }

  .task-text-wrap { flex: 1; min-width: 0; }

  .task-text {
    font-size: 16px; line-height: 1.4;
    color: var(--text); word-break: break-word;
    white-space: pre-wrap; outline: none;
    width: 100%;
    font-family: inherit;
    background: transparent; border: none;
    padding: 0; resize: none;
    cursor: text;
    caret-color: var(--text);
  }
  .task-text.done { text-decoration: line-through; color: var(--subtext); }

  .task-meta {
    font-size: 11px; color: var(--subtext);
    margin-top: 2px; display: flex; gap: 6px; align-items: center;
  }
  .task-priority-badge {
    font-size: 10px; font-weight: 600;
    padding: 1px 5px; border-radius: 4px;
    color: white; letter-spacing: 0.3px;
  }

  /* Add task inline row */
  .task-add-row {
    display: flex; align-items: center;
    padding: 11px 0;
    cursor: pointer;
  }
  .task-add-row-ph {
    font-size: 16px; color: #C7C7CC;
    padding-left: 45px;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 11px; font-weight: 600;
    color: var(--subtext); letter-spacing: 0.8px;
    padding: 18px 16px 6px; text-transform: uppercase;
  }

  /* ── BACKUP BUTTONS ── */
  #backup-row {
    display: flex; gap: 10px;
    padding: 20px 16px 8px;
  }
  .backup-btn {
    flex: 1; padding: 10px 0;
    background: var(--card); border: none;
    border-radius: 10px; font-size: 13px;
    color: var(--subtext); font-family: inherit;
    cursor: pointer;
  }

  /* ── BOTTOM NAV ── */
  #nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--nav-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: rgba(245,245,247,0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding-left: 32px; padding-right: 32px;
    z-index: 100;
  }
  .nav-btn {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 50%;
    transition: background 0.15s;
    flex-shrink: 0; background: none; border: none;
  }
  .nav-btn:active { background: rgba(0,0,0,0.06); }

  .nav-btn svg { width: 24px; height: 24px; }

  #btn-add {
    width: 40px; height: 40px;
    background: var(--text); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none; flex-shrink: 0;
    transition: transform 0.15s, background 0.15s;
  }
  #btn-add:active { transform: scale(0.92); }
  #btn-add svg { width: 20px; height: 20px; }

  /* ── LEFT MENU ── */
  #overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0);
    pointer-events: none; transition: background 0.3s;
  }
  #overlay.open { background: rgba(0,0,0,0.3); pointer-events: all; }

  #side-menu {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: min(72vw, 290px);
    background: var(--bg);
    z-index: 201; transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    padding-top: var(--safe-top);
  }
  #side-menu.open { transform: translateX(0); }

  #side-menu-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 16px 12px;
  }
  #side-menu-title { font-size: 20px; font-weight: 700; }

  #btn-new-list {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--text); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 20px; line-height: 1;
    flex-shrink: 0;
  }

  /* new list form */
  #new-list-form {
    display: none;
    padding: 0 16px 12px;
    gap: 8px; flex-direction: column;
  }
  #new-list-form.show { display: flex; }
  #new-list-form input {
    border: none; background: var(--card);
    border-radius: 8px; padding: 9px 12px;
    font-size: 15px; font-family: inherit;
    color: var(--text); outline: none;
    width: 100%;
  }
  .new-list-row { display: flex; gap: 8px; align-items: center; }

  /* lists */
  #lists-scroll { flex: 1; overflow-y: auto; padding: 0 0 20px; }

  .list-item {
    display: flex; align-items: center;
    padding: 10px 16px; cursor: pointer;
    gap: 10px; border-radius: 0;
    transition: background 0.12s;
  }
  .list-item:active { background: rgba(0,0,0,0.05); }
  .list-item.active { background: rgba(0,0,0,0.06); }

  .list-bracket {
    width: 3px; height: 18px; border-radius: 2px; flex-shrink: 0;
  }
  .list-name {
    font-size: 15px; flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .list-name-input {
    font-size: 15px; flex: 1; border: none;
    background: transparent; font-family: inherit;
    color: var(--text); outline: none; padding: 0;
  }

  /* ── MODAL BASE ── */
  .modal-wrap {
    position: fixed; inset: 0; z-index: 300;
    display: none; align-items: flex-end;
    background: rgba(0,0,0,0.4);
    padding-bottom: var(--safe-bottom);
  }
  .modal-wrap.show { display: flex; }
  .modal-wrap.center { align-items: center; padding: 0 16px; padding-bottom: var(--safe-bottom); }

  .modal {
    background: var(--card); border-radius: 20px 20px 0 0;
    width: 100%; max-height: 92vh;
    overflow-y: auto;
    padding: 20px 20px calc(16px + var(--safe-bottom));
    animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
  }
  .modal.center-modal {
    border-radius: 20px; max-height: 80vh;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 0 auto 20px;
  }

  .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; }

  /* form fields */
  .field-row {
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 12px;
  }
  .field-label { font-size: 12px; color: var(--subtext); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

  .field-input {
    width: 100%; padding: 12px; border-radius: 12px;
    background: var(--bg); border: none; outline: none;
    font-size: 16px; font-family: inherit; color: var(--text);
    -webkit-appearance: none;
  }
  .field-input::placeholder { color: #C7C7CC; }

  /* category chips */
  .cat-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .cat-chip {
    padding: 6px 12px; border-radius: 20px;
    font-size: 13px; cursor: pointer; border: 2px solid transparent;
    color: white; font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .cat-chip:active { transform: scale(0.95); }
  .cat-chip.selected { border-color: rgba(0,0,0,0.3); }
  .cat-chip[data-cat="none"] { color: var(--subtext); border-color: var(--border); background: var(--bg) !important; }
  .cat-chip[data-cat="none"].selected { border-color: var(--subtext); }

  /* date input */
  input[type="date"], input[type="time"] {
    color: var(--text); background: var(--bg);
    -webkit-appearance: none; appearance: none;
    font-family: inherit; font-size: 16px;
    border: none; outline: none;
    padding: 12px; border-radius: 12px; width: 100%;
  }
  input[type="date"]::-webkit-calendar-picker-indicator,
  input[type="time"]::-webkit-calendar-picker-indicator {
    opacity: 0.5;
  }

  .repeat-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .repeat-row input[type="number"] {
    width: 60px; padding: 10px 8px;
    border-radius: 10px; background: var(--bg);
    border: none; outline: none;
    font-size: 16px; text-align: center;
    font-family: inherit; color: var(--text);
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn-cancel, .btn-save {
    flex: 1; padding: 14px; border-radius: 14px;
    font-size: 16px; font-family: inherit;
    font-weight: 600; border: none; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-cancel { background: var(--bg); color: var(--subtext); }
  .btn-save { background: var(--text); color: white; }
  .btn-cancel:active, .btn-save:active { opacity: 0.7; }

  /* ── CALENDAR ── */
  #cal-modal .modal { border-radius: 20px 20px 0 0; }

  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-month { font-size: 17px; font-weight: 600; }
  .cal-nav-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 0; }
  .cal-dow { text-align: center; font-size: 11px; color: var(--subtext); padding: 4px 0 10px; font-weight: 500; }

  .cal-day {
    text-align: center; padding: 6px 2px;
    font-size: 15px; cursor: pointer; border-radius: 50%;
    aspect-ratio: 1; display: flex; align-items: center;
    justify-content: center; flex-direction: column;
    position: relative; margin: 2px auto; width: 36px;
    transition: background 0.15s;
  }
  .cal-day:active { background: var(--border); }
  .cal-day.today { background: var(--text); color: white; border-radius: 50%; }
  .cal-day.has-tasks::after {
    content: ''; width: 4px; height: 4px; border-radius: 50%;
    background: var(--cat-event); position: absolute; bottom: 3px;
  }
  .cal-day.other-month { color: var(--border); }
  .cal-day.selected { background: var(--border); border-radius: 50%; }

  /* ── CONTEXT MENU ── */
  #ctx-menu {
    position: fixed; z-index: 500;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 14px; padding: 6px 0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    min-width: 160px; display: none;
  }
  .ctx-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; font-size: 15px; cursor: pointer;
  }
  .ctx-item:active { background: var(--bg); }
  .ctx-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ── MINI CAT MENU ── */
  #cat-ctx {
    position: fixed; z-index: 500;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 14px; padding: 6px 0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    min-width: 180px; display: none;
  }
  .cat-ctx-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; font-size: 14px; cursor: pointer;
  }
  .cat-ctx-item:active { background: var(--bg); }

  /* ── LIST DETAIL VIEW ── */
  #list-ctx-menu {
    position: fixed; z-index: 500;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 14px; padding: 6px 0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    min-width: 180px; display: none;
  }
  .list-ctx-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; font-size: 14px; cursor: pointer;
  }

  /* toggle for lock in new list */
  .toggle-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.2s;
  }
  .toggle-btn.on { background: var(--text); border-color: var(--text); }

  /* date view label */
  #view-title {
    font-size: 17px; font-weight: 600; color: var(--subtext);
    padding: 4px 16px 0;
  }

  /* toast */
  #toast {
    position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: white;
    padding: 10px 18px; border-radius: 20px;
    font-size: 13px; opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 600; pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div id="header-date">Сегодня</div>
    <div id="header-weekday"></div>
  </div>

  <!-- MAIN SCROLL -->
  <div id="main">
    <div id="view-title" style="display:none"></div>
    <div id="task-list"></div>
    <div id="backup-row">
      <button class="backup-btn" onclick="backupData()">↓ Резервная копия</button>
      <button class="backup-btn" onclick="restoreData()">↑ Восстановить</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav id="nav">
  <button class="nav-btn" id="btn-menu" onclick="toggleMenu()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <button class="nav-btn" onclick="openCalendar()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
  </button>
  <button id="btn-add" onclick="openAddTask()">
    <svg fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</nav>

<!-- OVERLAY -->
<div id="overlay" onclick="closeMenu()"></div>

<!-- SIDE MENU -->
<div id="side-menu">
  <div id="side-menu-header">
    <span id="side-menu-title">Списки</span>
    <button id="btn-new-list" onclick="toggleNewListForm()">+</button>
  </div>
  <!-- New list form -->
  <div id="new-list-form">
    <input id="new-list-name" type="text" placeholder="Название списка" class="field-input" style="padding:9px 12px;font-size:15px;">
    <div style="display:flex;gap:8px;align-items:center;">
      <select id="new-list-cat" class="field-input" style="padding:9px 12px;font-size:15px;flex:1;">
        <option value="none">Без категории</option>
        <option value="event">Мероприятия</option>
        <option value="health">Здоровье</option>
        <option value="home">Бытовые</option>
        <option value="groceries">Продукты</option>
        <option value="shopping">Покупки</option>
        <option value="work">Работа</option>
        <option value="study">Учёба</option>
        <option value="hobby">Хобби</option>
      </select>
      <button class="toggle-btn" id="lock-btn" title="Закрепить список" onclick="toggleLock()">🔓</button>
      <button class="toggle-btn on" onclick="saveNewList()" title="Сохранить">✓</button>
    </div>
  </div>
  <div id="lists-scroll"></div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-wrap" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="cat-chips" id="add-cat-chips" style="margin-bottom:14px;"></div>
    <input type="text" class="field-input" id="add-task-text" placeholder="Задача…" style="margin-bottom:10px;">
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <input type="date" class="field-input" id="add-task-date" style="flex:1;">
      <input type="time" class="field-input" id="add-task-time" style="flex:0 0 auto;width:110px;">
    </div>
    <div class="repeat-row" style="margin-bottom:4px;">
      <span style="font-size:14px;color:var(--subtext);">Повторять каждые</span>
      <input type="number" id="add-repeat" min="0" value="0" placeholder="0">
      <span style="font-size:14px;color:var(--subtext);">дн.</span>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddTask()">Отмена</button>
      <button class="btn-save" onclick="saveTask()">Сохранить</button>
    </div>
  </div>
</div>

<!-- CALENDAR MODAL -->
<div class="modal-wrap" id="cal-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calPrev()">‹</button>
      <span class="cal-month" id="cal-month-label"></span>
      <button class="cal-nav-btn" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div style="margin-top:16px;">
      <button class="btn-cancel" style="width:100%;" onclick="closeCal()">Закрыть</button>
    </div>
  </div>
</div>

<!-- CONTEXT MENU (long press task) -->
<div id="ctx-menu"></div>
<!-- CAT CONTEXT MENU -->
<div id="cat-ctx"></div>
<!-- LIST CONTEXT MENU -->
<div id="list-ctx-menu"></div>

<!-- TOAST -->
<div id="toast"></div>

<input type="file" id="restore-file-input" accept=".json" style="display:none" onchange="handleRestoreFile(event)">

<script>
// ── CATEGORIES ──
const CATS = {
  event:     { label: 'Мероприятие', color: '#FF8C42' },
  health:    { label: 'Здоровье',    color: '#F06292' },
  home:      { label: 'Бытовые',     color: '#64B5F6' },
  groceries: { label: 'Продукты',    color: '#FFD54F' },
  shopping:  { label: 'Покупки',     color: '#AB47BC' },
  work:      { label: 'Работа',      color: '#90A4AE' },
  study:     { label: 'Учёба',       color: '#5C8EE8' },
  hobby:     { label: 'Хобби',       color: '#66BB6A' },
  none:      { label: 'Без кат.',    color: '#C8C8C8' },
};

// ── DEFAULT LISTS ──
const DEFAULT_LISTS = [
  { id: 'today',  name: 'Дела на сегодня', cat: 'none', locked: true },
  { id: 'groceries', name: 'Продукты',    cat: 'groceries', locked: true },
  { id: 'events', name: 'Мероприятия',    cat: 'event', locked: true },
  { id: 'health', name: 'Здоровье',       cat: 'health', locked: true },
];

// ── STATE ──
let state = {
  tasks: [],
  lists: JSON.parse(JSON.stringify(DEFAULT_LISTS)),
  currentList: 'today',
  viewDate: null, // null = today
};

function saveState() { localStorage.setItem('todo_state', JSON.stringify(state)); }
function loadState() {
  const s = localStorage.getItem('todo_state');
  if (s) {
    state = JSON.parse(s);
    // ensure default lists
    DEFAULT_LISTS.forEach(dl => {
      if (!state.lists.find(l => l.id === dl.id)) state.lists.unshift(dl);
    });
  }
  migrateTaskDates();
}

// Auto transfer incomplete tasks
function migrateTaskDates() {
  const today = todayStr();
  state.tasks.forEach(t => {
    if (!t.done && t.date && t.date < today && !['event','health'].includes(t.cat)) {
      if (t.repeat && parseInt(t.repeat) > 0) {
        // advance date by repeat days
        let d = new Date(t.date + 'T00:00:00');
        const r = parseInt(t.repeat);
        while (fmtDate(d) < today) d.setDate(d.getDate() + r);
        t.date = fmtDate(d);
      } else {
        t.date = today;
      }
    }
  });
  saveState();
}

function fmtDate(d) {
  return d.toISOString().split('T')[0];
}
function todayStr() { return fmtDate(new Date()); }

// ── DATE DISPLAY ──
function formatHeader(dateStr) {
  const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date();
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}
function formatWeekday(dateStr) {
  const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date();
  const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  return days[d.getDay()];
}

// ── RENDER HEADER ──
function renderHeader() {
  const dateStr = state.viewDate;
  document.getElementById('header-date').textContent = 'Сегодня ' + formatHeader(dateStr);
  document.getElementById('header-weekday').textContent = formatWeekday(dateStr);
}

// ── CURRENT LIST ──
function currentListObj() {
  return state.lists.find(l => l.id === state.currentList) || state.lists[0];
}

// Tasks for current view
function getViewTasks() {
  const today = todayStr();
  const viewDate = state.viewDate || today;
  const cl = currentListObj();

  if (state.viewDate) {
    // Calendar date view: show all tasks for that date
    return state.tasks.filter(t => t.date === state.viewDate);
  }

  // today list: tasks for today + priority tasks within 7 days
  if (cl.id === 'today') {
    const in7 = new Date();
    in7.setDate(in7.getDate() + 7);
    const in7Str = fmtDate(in7);

    return state.tasks.filter(t => {
      if (t.date === today) return true;
      if (!t.done && ['event','health'].includes(t.cat) && t.date && t.date <= in7Str && t.date >= today) return true;
      return false;
    });
  }

  // specific list
  return state.tasks.filter(t => t.listId === cl.id);
}

// ── RENDER TASKS ──
function renderTasks() {
  const list = document.getElementById('task-list');
  list.innerHTML = '';

  const tasks = getViewTasks();

  // Sort: priority (event/health) first, then by date/time
  const sorted = [...tasks].sort((a, b) => {
    const ap = ['event','health'].includes(a.cat) ? 0 : 1;
    const bp = ['event','health'].includes(b.cat) ? 0 : 1;
    if (ap !== bp) return ap - bp;
    if (a.time && b.time) return a.time.localeCompare(b.time);
    if (a.time) return -1; if (b.time) return 1;
    return 0;
  });

  const cl = currentListObj();
  const viewTitle = document.getElementById('view-title');
  if (state.viewDate && state.viewDate !== todayStr()) {
    viewTitle.style.display = 'block';
    viewTitle.textContent = formatHeader(state.viewDate) + ' · ' + formatWeekday(state.viewDate);
  } else {
    viewTitle.style.display = 'none';
  }

  sorted.forEach(task => {
    list.appendChild(createTaskEl(task));
  });

  // Add "tap to add" row
  const addRow = document.createElement('div');
  addRow.className = 'task-add-row';
  addRow.innerHTML = `<span class="task-add-row-ph">+ Добавить задачу…</span>`;
  addRow.addEventListener('click', openAddTask);
  list.appendChild(addRow);

  renderLists();
}

function createTaskEl(task) {
  const cat = CATS[task.cat] || CATS.none;
  const div = document.createElement('div');
  div.className = 'task-item';
  div.dataset.id = task.id;

  // bracket
  const bracket = document.createElement('div');
  bracket.className = 'task-bracket';
  bracket.style.background = cat.color;

  // checkbox
  const check = document.createElement('button');
  check.className = 'task-check' + (task.done ? ' done' : '');
  check.addEventListener('click', () => toggleDone(task.id));

  // text wrap
  const wrap = document.createElement('div');
  wrap.className = 'task-text-wrap';

  const textarea = document.createElement('textarea');
  textarea.className = 'task-text' + (task.done ? ' done' : '');
  textarea.value = task.text;
  textarea.rows = 1;
  textarea.style.overflow = 'hidden';

  // auto resize
  function autoResize() {
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
  }
  textarea.addEventListener('input', () => {
    autoResize();
    task.text = textarea.value;
    saveState();
  });
  textarea.addEventListener('focus', autoResize);
  setTimeout(autoResize, 0);

  // Long press for category context menu
  let pressTimer = null;
  function startPress(e) {
    pressTimer = setTimeout(() => {
      pressTimer = null;
      showCatCtx(task, e);
    }, 500);
  }
  function endPress() { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } }

  div.addEventListener('touchstart', startPress, { passive: true });
  div.addEventListener('touchend', endPress);
  div.addEventListener('touchmove', endPress, { passive: true });
  div.addEventListener('mousedown', startPress);
  div.addEventListener('mouseup', endPress);

  // meta (date, time for priority)
  const meta = document.createElement('div');
  meta.className = 'task-meta';
  if (['event','health'].includes(task.cat) && task.date) {
    const today = todayStr();
    const badge = document.createElement('span');
    badge.className = 'task-priority-badge';
    badge.style.background = cat.color;
    badge.textContent = formatHeader(task.date);
    if (task.time) badge.textContent += ' ' + task.time;
    meta.appendChild(badge);
  }

  wrap.appendChild(textarea);
  wrap.appendChild(meta);
  div.appendChild(bracket);
  div.appendChild(check);
  div.appendChild(wrap);
  return div;
}

function toggleDone(id) {
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  saveState();
  renderTasks();
  checkListAutoHide();
}

function checkListAutoHide() {
  state.lists = state.lists.filter(l => {
    if (l.locked) return true;
    const tasks = state.tasks.filter(t => t.listId === l.id);
    if (tasks.length === 0) return true;
    return !tasks.every(t => t.done);
  });
  saveState();
}

// ── ADD TASK ──
let addTaskCat = 'none';
let editingTaskId = null;

function openAddTask() {
  const cl = currentListObj();
  // Pre-select category based on current list
  if (['event','health','groceries'].includes(cl.cat)) addTaskCat = cl.cat;
  else addTaskCat = cl.id === 'today' ? 'home' : 'none';

  document.getElementById('add-task-text').value = '';
  const today = todayStr();
  document.getElementById('add-task-date').value = today;
  document.getElementById('add-task-time').value = '';
  document.getElementById('add-repeat').value = 0;
  renderCatChips();
  document.getElementById('add-modal').classList.add('show');
  setTimeout(() => document.getElementById('add-task-text').focus(), 300);
}

function closeAddTask() {
  document.getElementById('add-modal').classList.remove('show');
  editingTaskId = null;
}

function renderCatChips() {
  const wrap = document.getElementById('add-cat-chips');
  wrap.innerHTML = '';
  Object.entries(CATS).forEach(([key, c]) => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip' + (addTaskCat === key ? ' selected' : '');
    chip.dataset.cat = key;
    chip.textContent = c.label;
    if (key !== 'none') chip.style.background = c.color;
    chip.addEventListener('click', () => {
      addTaskCat = key;
      renderCatChips();
    });
    wrap.appendChild(chip);
  });
}

function saveTask() {
  const text = document.getElementById('add-task-text').value.trim();
  if (!text) return;

  const date = document.getElementById('add-task-date').value || todayStr();
  const time = document.getElementById('add-task-time').value;
  const repeat = document.getElementById('add-repeat').value;
  const cl = currentListObj();

  // Determine list assignment
  let listId = cl.id;
  if (['event','health'].includes(addTaskCat)) {
    const matchList = state.lists.find(l => l.cat === addTaskCat);
    if (matchList) listId = matchList.id;
  }

  const task = {
    id: Date.now().toString(),
    text,
    cat: addTaskCat,
    date,
    time,
    repeat,
    done: false,
    listId,
    created: todayStr(),
  };

  state.tasks.push(task);
  saveState();
  closeAddTask();
  renderTasks();
  showToast('Задача добавлена');
}

// ── LISTS ──
function renderLists() {
  const wrap = document.getElementById('lists-scroll');
  wrap.innerHTML = '';

  state.lists.forEach(l => {
    const cat = CATS[l.cat] || CATS.none;
    const item = document.createElement('div');
    item.className = 'list-item' + (l.id === state.currentList ? ' active' : '');
    item.dataset.lid = l.id;

    const bracket = document.createElement('div');
    bracket.className = 'list-bracket';
    bracket.style.background = cat.color;

    const name = document.createElement('span');
    name.className = 'list-name';
    name.textContent = l.name;

    // count
    const count = state.tasks.filter(t => t.listId === l.id && !t.done).length;
    const badge = document.createElement('span');
    badge.style.cssText = 'font-size:12px;color:var(--subtext);';
    if (count > 0) badge.textContent = count;

    item.appendChild(bracket);
    item.appendChild(name);
    item.appendChild(badge);

    // tap: switch list
    let tapTimer = null;
    item.addEventListener('click', () => {
      if (tapTimer) return;
      state.viewDate = null;
      state.currentList = l.id;
      closeMenu();
      saveState();
      renderHeader();
      renderTasks();
    });

    // long press: rename (if not default)
    let lp = null;
    item.addEventListener('touchstart', e => {
      lp = setTimeout(() => {
        lp = null;
        showListCtxMenu(l, e.touches[0]);
      }, 500);
    }, { passive: true });
    item.addEventListener('touchend', () => { if (lp) { clearTimeout(lp); lp = null; } });

    wrap.appendChild(item);
  });
}

function showListCtxMenu(list, touch) {
  const menu = document.getElementById('list-ctx-menu');
  menu.innerHTML = '';
  Object.entries(CATS).forEach(([key, c]) => {
    const it = document.createElement('div');
    it.className = 'list-ctx-item';
    const dot = document.createElement('span');
    dot.className = 'ctx-dot';
    dot.style.background = c.color;
    it.appendChild(dot);
    it.appendChild(document.createTextNode(c.label));
    it.addEventListener('click', () => {
      if (!DEFAULT_LISTS.find(d => d.id === list.id)) list.cat = key;
      saveState(); renderLists(); hideListCtxMenu();
    });
    menu.appendChild(it);
  });
  positionCtx(menu, touch);
  menu.style.display = 'block';
  document.addEventListener('click', hideListCtxMenu, { once: true });
}
function hideListCtxMenu() { document.getElementById('list-ctx-menu').style.display = 'none'; }

let lockEnabled = false;
function toggleLock() {
  lockEnabled = !lockEnabled;
  const btn = document.getElementById('lock-btn');
  btn.textContent = lockEnabled ? '🔒' : '🔓';
  btn.classList.toggle('on', lockEnabled);
}

let newListFormOpen = false;
function toggleNewListForm() {
  newListFormOpen = !newListFormOpen;
  document.getElementById('new-list-form').classList.toggle('show', newListFormOpen);
  if (newListFormOpen) document.getElementById('new-list-name').focus();
}

function saveNewList() {
  const name = document.getElementById('new-list-name').value.trim();
  if (!name) return;
  const cat = document.getElementById('new-list-cat').value;
  const id = 'list_' + Date.now();
  state.lists.push({ id, name, cat, locked: lockEnabled });
  lockEnabled = false;
  document.getElementById('lock-btn').textContent = '🔓';
  document.getElementById('lock-btn').classList.remove('on');
  document.getElementById('new-list-name').value = '';
  newListFormOpen = false;
  document.getElementById('new-list-form').classList.remove('show');
  saveState();
  renderLists();
}

// ── MENU ──
function toggleMenu() {
  const menu = document.getElementById('side-menu');
  const overlay = document.getElementById('overlay');
  menu.classList.toggle('open');
  overlay.classList.toggle('open');
}
function closeMenu() {
  document.getElementById('side-menu').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── CALENDAR ──
let calDate = new Date();

function openCalendar() {
  calDate = new Date();
  renderCal();
  document.getElementById('cal-modal').classList.add('show');
}
function closeCal() { document.getElementById('cal-modal').classList.remove('show'); }

function calPrev() { calDate.setMonth(calDate.getMonth()-1); renderCal(); }
function calNext() { calDate.setMonth(calDate.getMonth()+1); renderCal(); }

function renderCal() {
  const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('cal-month-label').textContent = months[calDate.getMonth()] + ' ' + calDate.getFullYear();

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = d;
    grid.appendChild(el);
  });

  const first = new Date(calDate.getFullYear(), calDate.getMonth(), 1);
  const last = new Date(calDate.getFullYear(), calDate.getMonth()+1, 0);
  const today = todayStr();

  // day of week Monday-based
  let startDow = first.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1;

  for (let i = 0; i < startDow; i++) {
    const blank = document.createElement('div');
    blank.className = 'cal-day other-month';
    grid.appendChild(blank);
  }

  // Get all task dates
  const taskDates = new Set(state.tasks.map(t => t.date));

  for (let d = 1; d <= last.getDate(); d++) {
    const dateStr = calDate.getFullYear() + '-' + String(calDate.getMonth()+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    if (dateStr === today) el.classList.add('today');
    if (taskDates.has(dateStr)) el.classList.add('has-tasks');
    el.addEventListener('click', () => {
      closeCal();
      state.viewDate = dateStr;
      state.currentList = 'today';
      renderHeader();
      renderTasks();
    });
    grid.appendChild(el);
  }
}

// ── CATEGORY CONTEXT MENU (long press task) ──
function showCatCtx(task, e) {
  const menu = document.getElementById('cat-ctx');
  menu.innerHTML = '';
  Object.entries(CATS).forEach(([key, c]) => {
    const it = document.createElement('div');
    it.className = 'cat-ctx-item';
    const dot = document.createElement('span');
    dot.className = 'ctx-dot';
    dot.style.background = c.color;
    it.appendChild(dot);
    it.appendChild(document.createTextNode(c.label));
    it.addEventListener('click', () => {
      task.cat = key;
      saveState(); renderTasks(); hideCatCtx();
    });
    menu.appendChild(it);
  });
  const touch = e.touches ? e.touches[0] : e;
  positionCtx(menu, touch);
  menu.style.display = 'block';
  document.addEventListener('click', hideCatCtx, { once: true });
}
function hideCatCtx() { document.getElementById('cat-ctx').style.display = 'none'; }

function positionCtx(menu, touch) {
  menu.style.display = 'block';
  const x = touch ? touch.clientX : window.innerWidth/2;
  const y = touch ? touch.clientY : window.innerHeight/2;
  menu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - 300) + 'px';
}

// ── BACKUP / RESTORE ──
function backupData() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'tasks_backup_' + todayStr() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Резервная копия сохранена');
}

function restoreData() {
  document.getElementById('restore-file-input').click();
}

function handleRestoreFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.tasks && data.lists) {
        state = data;
        saveState();
        renderHeader();
        renderTasks();
        showToast('Данные восстановлены');
      }
    } catch { showToast('Ошибка файла'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── ENTER KEY on add modal ──
document.getElementById('add-task-text').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); saveTask(); }
});

// close modals on backdrop click
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-modal')) closeAddTask();
});
document.getElementById('cal-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('cal-modal')) closeCal();
});

// ── INIT ──
loadState();
renderCatChips();
renderHeader();
renderTasks();
</script>
</body>
